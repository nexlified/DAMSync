  - name: assets
    description: Asset upload, retrieval, metadata, and lifecycle management
  - name: folders
    description: Folder tree management
  - name: tags
    description: Tag creation and assignment
  - name: collections
    description: Curated asset collections
  - name: styles
    description: Image transformation style presets
  - name: search
    description: Cross-resource full-text search
  - name: orgs
    description: Org profile and settings
  - name: users
    description: User management within an org
  - name: api-keys
    description: Programmatic API key management
  - name: webhooks
    description: Webhook endpoints and delivery history
  - name: domains
    description: Custom domain management and verification
