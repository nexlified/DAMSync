          description: Domain list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/DomainRecord'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      tags: [domains]
      summary: Add a custom domain (owner/admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
