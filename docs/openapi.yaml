        '201':
          description: Domain record with challenge token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DomainRecord'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
