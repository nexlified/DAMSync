  # ── Search ─────────────────────────────────────────────────────────────────
  /api/v1/search:
    get:
      tags: [search]
      summary: Full-text search across assets, folders, tags, and collections
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                type: object
                properties:
                  assets:
                    type: array
                    items:
                      $ref: '#/components/schemas/Asset'
                  folders:
                    type: array
                    items:
                      $ref: '#/components/schemas/Folder'
                  tags:
                    type: array
                    items:
                      $ref: '#/components/schemas/Tag'
                  collections:
                    type: array
                    items:
                      $ref: '#/components/schemas/Collection'
