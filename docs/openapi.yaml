  # ── API Keys ───────────────────────────────────────────────────────────────
  /api/v1/api-keys:
    get:
      tags: [api-keys]
      summary: List API keys for the org
      responses:
        '200':
          description: API key list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/APIKey'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      tags: [api-keys]
      summary: Create an API key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                scopes:
                  type: array
                  items:
                    type: string
                    enum: [assets:read, assets:write, assets:delete, admin]
                ip_allowlist:
                  type: array
                  items:
                    type: string
      responses:
        '201':
          description: Created API key — the raw key is returned once and never again
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/APIKey'
                  - type: object
                    properties:
                      key:
                        type: string
                        description: Full raw key (shown once only)
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/api-keys/{id}:
    delete:
      tags: [api-keys]
      summary: Revoke an API key
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Revoked
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # ── Webhooks ───────────────────────────────────────────────────────────────
  /api/v1/webhooks:
    get:
      tags: [webhooks]
      summary: List webhooks
